name: Asignar equipos eliminatoria (bracket)

# Automático cada 2 horas (aplica) + disparo manual (dry-run por defecto).
on:
  schedule:
    # Cada 2 horas, desfasado 30 min de "Actualizar resultados". Cron en UTC.
    - cron: "30 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "1 = simular (no escribe) | 0 = aplicar a la BD"
        required: false
        default: "1"

jobs:
  asignar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar asignador de eliminatoria
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # Manual: usa el input (default 1 = dry-run seguro).
          # Programado (schedule): sin input -> aplica (0).
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python scripts/asignar_equipos_knockout.py
