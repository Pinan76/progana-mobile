name: Asignar equipos eliminatoria (bracket)

# Automático cada HORA (aplica solo) + disparo manual (también aplica por defecto).
on:
  schedule:
    # Cada hora, 15 min pasada (después de "Actualizar resultados"). Cron en UTC.
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "0 = aplicar (default) | 1 = solo simular"
        required: false
        default: "0"

jobs:
  asignar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar asignador de eliminatoria
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # Manual: usa el input (default 0 = aplicar). Programado: sin input -> 0.
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python scripts/asignar_equipos_knockout.py
